allow_embedding: false
db_schema:
  feedback:
    client: none
    columns:
    - admin_ui: {order: 0, width: 200}
      client_hidden: false
      name: Name
      type: string
    - admin_ui: {order: 1, width: 200}
      client_hidden: false
      name: Email
      type: string
    - admin_ui: {order: 2, width: 200}
      client_hidden: false
      name: Feedback
      type: string
    - admin_ui: {order: 3, width: 200}
      client_hidden: false
      name: Likelihood
      type: string
    - admin_ui: {order: 4, width: 200}
      client_hidden: false
      name: Created
      type: datetime
    indexes: []
    server: full
    title: Feedback
  files:
    client: none
    columns:
    - admin_ui: {order: 0, width: 200}
      client_hidden: false
      name: path
      type: string
    - admin_ui: {order: 1, width: 200}
      client_hidden: false
      name: file
      type: media
    - admin_ui: {order: 2, width: 200}
      client_hidden: false
      name: file_version
      type: string
    indexes: []
    server: full
    title: Files
dependencies: []
metadata: {title: Feedback form}
name: Feedback form final
package_name: Feedback_form_final
renamed: true
runtime_options:
  client_version: '3'
  legacy_features: {bootstrap3: true, class_names: true}
  server_spec: {base: python310-minimal}
  version: 3
services:
- client_config: {enable_v2: true}
  server_config: {}
  source: /runtime/services/tables.yml
- client_config: {}
  server_config: {file_table: files}
  source: /runtime/services/anvil/files.yml
- client_config: {}
  server_config: {custom_smtp: false}
  source: /runtime/services/anvil/email.yml
startup: {module: Feedback_Form, type: form}
startup_form: null
